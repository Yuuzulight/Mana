<!doctype html>
<html>
<head</html>>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>Mana - Desktop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app</body>">
    <div id="sprite" class="sprite idle" role="img" aria-label="Mana avatar"></div>
    <h2>Speak to</h2> Mana</h2>
    <div id="status">Starting...</div>
    <div id="transcript" class="box">(transcript will appear here)</div>
    <div class="controls">
      <button id="btnRecord">Hold to Talk</button>
      <button id="btnStop">Stop</button>
      <button id="btnClear">Clear</button>
    </div>
    <div id="reply" class="box">(reply will appear here)</div>
    <pre id="backendLogs" class="logs"></pre>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
