<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Local AI Assistant</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; }
      #status { margin-bottom: 12px; }
      #transcript { margin-top: 12px; white-space: pre-wrap; }
      #modelReply { margin-top: 12px; font-weight: bold; }
      #perfPanel {
        margin-top: 14px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
        font-size: 12px;
      }
      #perfPanel pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
      }
      #doctorPanel {
        margin-top: 14px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
        font-size: 12px;
      }
      #doctorHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      #doctorSummary {
        margin-top: 8px;
        color: #333;
      }
      #doctorChecks {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .doctor-check {
        padding: 8px;
        border-left: 4px solid #999;
        background: #f8f8f8;
      }
      .doctor-check-pass {
        border-left-color: #1f8f4d;
      }
      .doctor-check-warn {
        border-left-color: #c98200;
      }
      .doctor-check-fail {
        border-left-color: #c0392b;
      }
      .doctor-check-title {
        font-weight: bold;
      }
      button { padding: 10px 14px; font-size: 14px; }
      #listenToggle {
        background: #0b84ff;
        color: white;
        border: none;
        border-radius: 6px;
      }
      #listenToggle.active {
        background: #c0392b;
      }
    </style>
  </head>
  <body>
    <h3>Local AI Assistant</h3>
    <div id="status">Status: <span id="statustxt">Starting...</span></div>

    <div>
      <button id="openWebUI">Open Model Web UI</button>
      <span style="margin-left:8px">(Make sure web UI is at http://localhost:7860)</span>
    </div>

    <div style="margin-top:18px">
      <button id="listenToggle">Start listening</button>
      <span style="margin-left:8px">Say "Mana" or "wake up" once to wake her for the session.</span>
    </div>

    <div style="margin-top:12px">
      <label>
        <input id="gamingMode" type="checkbox" checked />
        Gaming mode: reduce idle processing when a watched game is running
      </label>
      <span id="gamingStatus" style="margin-left:8px">Checking games...</span>
    </div>

    <div id="perfPanel">
      <strong>Performance</strong>
      <pre id="perfStatus">Waiting for metrics...</pre>
    </div>

    <div id="doctorPanel">
      <div id="doctorHeader">
        <strong id="doctorTitle">Doctor</strong>
        <button id="runDoctor">Run checks</button>
      </div>
      <div id="doctorSummary">Not checked yet</div>
      <div id="doctorChecks"></div>
    </div>

    <div id="transcript"></div>
    <div id="modelReply"></div>

    <script src="renderer.js"></script>
  </body>
</html>
