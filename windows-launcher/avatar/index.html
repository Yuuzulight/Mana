<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mana Avatar</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #avatar,
      #live2d {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: bottom left;
        filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.32));
        transition:
          transform 120ms ease,
          filter 120ms ease;
        transform-origin: bottom center;
      }

      #live2d {
        display: none;
      }

      body[data-renderer="live2d"] #avatar {
        display: none;
      }

      body[data-renderer="live2d"] #live2d {
        display: block;
      }

      body[data-state="talking"] #avatar,
      body[data-state="talking"] #live2d {
        transform: translateY(-3px) scale(1.015);
        filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.38));
      }

      body[data-state="excited"] #avatar,
      body[data-state="excited"] #live2d {
        animation: excited-hop 420ms ease-in-out infinite;
      }

      body[data-state="angry"] #avatar,
      body[data-state="angry"] #live2d {
        animation: angry-hop 300ms ease-in-out infinite;
      }

      @keyframes excited-hop {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg) scale(1.01);
        }
        45% {
          transform: translateY(-10px) rotate(1deg) scale(1.035);
        }
      }

      @keyframes angry-hop {
        0%,
        100% {
          transform: translateY(0) translateX(-1px) rotate(-1deg) scale(1.02);
        }
        50% {
          transform: translateY(-7px) translateX(1px) rotate(1deg) scale(1.035);
        }
      }
    </style>
  </head>
  <body data-state="idle" data-renderer="sprite">
    <img id="avatar" src="../assets/avatar/idle.svg" alt="" />
    <canvas id="live2d"></canvas>
    <!-- Live2D Cubism Core is proprietary and fetched at setup time
         (npm run fetch-live2d-core); the avatar falls back to sprites
         when it is absent. -->
    <script src="../assets/live2d/live2dcubismcore.min.js"></script>
    <script src="../node_modules/pixi.js/dist/browser/pixi.min.js"></script>
    <script src="../node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
