<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mana Avatar</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #avatar {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: bottom left;
        filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.32));
        transition:
          transform 120ms ease,
          filter 120ms ease;
        transform-origin: bottom center;
      }

      body[data-state="talking"] #avatar {
        transform: translateY(-3px) scale(1.015);
        filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.38));
      }

      body[data-state="excited"] #avatar {
        animation: excited-hop 420ms ease-in-out infinite;
      }

      body[data-state="angry"] #avatar {
        animation: angry-hop 300ms ease-in-out infinite;
      }

      @keyframes excited-hop {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg) scale(1.01);
        }
        45% {
          transform: translateY(-10px) rotate(1deg) scale(1.035);
        }
      }

      @keyframes angry-hop {
        0%,
        100% {
          transform: translateY(0) translateX(-1px) rotate(-1deg) scale(1.02);
        }
        50% {
          transform: translateY(-7px) translateX(1px) rotate(1deg) scale(1.035);
        }
      }
    </style>
  </head>
  <body data-state="idle">
    <img id="avatar" src="../assets/avatar/idle.png" alt="" />
    <script src="renderer.js"></script>
  </body>
</html>
