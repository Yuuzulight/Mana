<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mana Avatar</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #avatar {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: bottom left;
        filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.32));
        transition:
          transform 120ms ease,
          filter 120ms ease;
        transform-origin: bottom center;
      }

      body[data-state="talking"] #avatar {
        transform: translateY(-3px) scale(1.015);
        filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.38));
      }
    </style>
  </head>
  <body data-state="idle">
    <img id="avatar" src="../assets/avatar/idle.png" alt="" />
    <script src="renderer.js"></script>
  </body>
</html>
