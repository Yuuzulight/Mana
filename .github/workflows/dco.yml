name: DCO check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git fetch --no-tags --prune --unshallow || true

      - name: Determine base ref
        run: |
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          echo "PR_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - name: Fetch base branch
        run: git fetch origin $BASE_REF

      - name: Check commits for Signed-off-by
        run: |
          set -euo pipefail
          echo "Checking commits between origin/$BASE_REF and $PR_SHA"
          commits=$(git rev-list --no-merges origin/$BASE_REF..$PR_SHA || true)
          if [ -z "$commits" ]; then
            echo "No new commits to check."
            exit 0
          fi
          missing=0
          for c in $commits; do
            echo "Inspecting commit $c"
            if ! git show -s --format=%B $c | grep -i -q '^Signed-off-by: '; then
              echo "Commit $c is missing a Signed-off-by line"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are missing Signed-off-by lines."
            echo "Please sign your commits with DCO (add 'Signed-off-by: Your Name <you@example.com>' to commit messages) or submit a signed CLA as described in CONTRIBUTING.md/CLA.md."
            exit 1
          fi
          echo "All commits have DCO sign-offs."