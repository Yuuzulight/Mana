name: DCO check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  dco:
    runs-on: ubuntu-latest
    env:
      MAINTAINERS: "Yuuzulight"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git fetch --no-tags --prune --unshallow || true

      - name: Determine base ref and PR author
        if: ${{ github.event.pull_request != null }}
        run: |
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          echo "PR_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_ENV

      - name: Fetch base branch
        if: ${{ env.BASE_REF != '' }}
        run: git fetch origin $BASE_REF

      - name: Check commits for Signed-off-by or signed CLA in PR
        if: ${{ env.PR_SHA != '' }}
        run: |
          set -euo pipefail

          # Allow maintainers to bypass DCO enforcement
          if [ -n "${MAINTAINERS}" ]; then
            for m in $(echo "$MAINTAINERS" | tr ',' '\n'); do
              if [ "${PR_AUTHOR}" = "$m" ]; then
                echo "PR author $PR_AUTHOR is a maintainer; bypassing DCO check.";
                exit 0;
              fi
            done
          fi

          echo "Checking commits between origin/$BASE_REF and $PR_SHA"
          commits=$(git rev-list --no-merges origin/$BASE_REF..$PR_SHA || true)
          if [ -z "$commits" ]; then
            echo "No new commits to check."
            exit 0
          fi

          missing=0
          for c in $commits; do
            echo "Inspecting commit $c"
            if ! git show -s --format=%B $c | grep -i -q '^Signed-off-by: '; then
              echo "Commit $c is missing a Signed-off-by line"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are missing Signed-off-by lines. Checking for a signed CLA file in the PR..."
            # list files changed in the PR range
            files_changed=$(git diff --name-only origin/$BASE_REF..$PR_SHA || true)
            echo "Files changed in PR:
$files_changed"

            # look for obvious signed CLA filenames (case-insensitive)
            cla_found=0
            for f in $files_changed; do
              lname=$(echo "$f" | tr '[:upper:]' '[:lower:]')
              if echo "$lname" | grep -qE '(signed[_-]?cla|cla[_-]?signed|cla[_-]?scan|signed[_-]?agreement)'; then
                echo "Found candidate signed CLA file: $f"
                cla_found=1
                break
              fi
            done

            if [ "$cla_found" -eq 1 ]; then
              echo "Signed CLA file detected in PR — allowing unsigned commits since contributor submitted a CLA in this PR."
              exit 0
            else
              echo "No signed CLA file found in PR."
              echo "Please sign your commits with DCO (add 'Signed-off-by: Your Name <you@example.com>' to commit messages) or submit a signed CLA as described in CONTRIBUTING.md/CLA.md."
              # fail the job to require either DCO or CLA
              exit 1
            fi
          fi
          echo "All commits have DCO sign-offs."