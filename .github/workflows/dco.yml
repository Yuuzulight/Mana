name: DCO check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  dco:
    runs-on: ubuntu-latest
    env:
      MAINTAINERS: "Yuuzulight"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git fetch --no-tags --prune --unshallow || true

      - name: Determine base ref and PR author
        if: ${{ github.event.pull_request != null }}
        run: |
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          echo "PR_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_ENV

      - name: Fetch base branch
        if: ${{ env.BASE_REF != '' }}
        run: git fetch origin $BASE_REF

      - name: Debug DCO context
        if: ${{ env.PR_SHA != '' }}
        run: |
          echo "DEBUG: PR_AUTHOR=$PR_AUTHOR"
          echo "DEBUG: MAINTAINERS=$MAINTAINERS"
          echo "DEBUG: BASE_REF=$BASE_REF"
          echo "DEBUG: PR_SHA=$PR_SHA"
          echo "Listing recent commits between origin/$BASE_REF and $PR_SHA"
          git --no-pager log --oneline origin/$BASE_REF..$PR_SHA || true

      - name: Check commits for Signed-off-by or signed CLA in PR (non-blocking)
        if: ${{ env.PR_SHA != '' }}
        run: |
          set -euo pipefail

          # Allow maintainers to bypass DCO enforcement
          if [ -n "${MAINTAINERS}" ]; then
            for m in $(echo "$MAINTAINERS" | tr ',' '\n'); do
              if [ "${PR_AUTHOR}" = "$m" ]; then
                echo "PR author $PR_AUTHOR is a maintainer; bypassing DCO check.";
                echo "DCO_MISSING=0" >> $GITHUB_ENV
                exit 0;
              fi
            done
          fi

          echo "Checking commits between origin/$BASE_REF and $PR_SHA"
          commits=$(git rev-list --no-merges origin/$BASE_REF..$PR_SHA || true)
          if [ -z "$commits" ]; then
            echo "No new commits to check."
            echo "DCO_MISSING=0" >> $GITHUB_ENV
            exit 0
          fi

          missing=0
          missing_list=""
          for c in $commits; do
            echo "Inspecting commit $c"
            body=$(git show -s --format=%B $c)
            if ! echo "$body" | grep -iq '^Signed-off-by: '; then
              echo "Commit $c is missing a Signed-off-by line"
              missing=1
              missing_list="$missing_list $c"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are missing Signed-off-by lines. Checking for a signed CLA file in the PR..."
            # list files changed in the PR range
            files_changed=$(git diff --name-only origin/$BASE_REF..$PR_SHA || true)
            echo "Files changed in PR: $files_changed"

            # look for obvious signed CLA filenames (case-insensitive)
            cla_found=0
            for f in $files_changed; do
              lname=$(echo "$f" | tr '[:upper:]' '[:lower:]')
              if echo "$lname" | grep -qE '(signed[_-]?cla|cla[_-]?signed|cla[_-]?scan|signed[_-]?agreement)'; then
                echo "Found candidate signed CLA file: $f"
                cla_found=1
                break
              fi
            done

            if [ "$cla_found" -eq 1 ]; then
              echo "Signed CLA file detected in PR â€” allowing unsigned commits since contributor submitted a CLA in this PR."
              echo "DCO_MISSING=0" >> $GITHUB_ENV
            else
              echo "No signed CLA file found in PR."
              echo "DCO_MISSING=1" >> $GITHUB_ENV
              echo "DCO_MISSING_LIST=$missing_list" >> $GITHUB_ENV
              # do not fail CI; we will notify via comment
            fi
          else
            echo "All commits have DCO sign-offs."
            echo "DCO_MISSING=0" >> $GITHUB_ENV
          fi

      - name: Notify contributors about missing DCO (non-blocking)
        if: env.DCO_MISSING == '1' && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const missing = process.env.DCO_MISSING_LIST || '';
            const body = `One or more commits in this PR are missing DCO sign-offs (Signed-off-by).\n\nMissing commits:${missing}\n\nPlease either:\n- Add a 'Signed-off-by: Your Name <you@example.com>' line to each commit you authored, or\n- Include a signed CLA file in the PR (recommended filename: SIGNED_CLA_<YourName>.pdf at repo root or in /cla).\n\nSee CONTRIBUTING.md for details.`;
            const pr_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr_number, body });
            console.log('Posted DCO guidance comment on PR #' + pr_number);