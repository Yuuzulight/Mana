name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fast-node-tests:
    name: Fast Node tests (unit + pairing smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.18.0

      - name: Install dependencies for node-bot
        working-directory: ./node-bot
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Run fast tests
        working-directory: ./node-bot
        env:
          SKIP_HEAVY_MODEL_TESTS: 1
        run: |
          echo "Running fast node tests (skipping heavy model tests)"
          npm test

  # Packaging is handled in Heavy CI (opt-in). Keep this CI minimal to provide fast feedback.
