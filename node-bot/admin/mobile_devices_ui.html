<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mana — Mobile Devices</title>
  <style>
    body{font-family:Segoe UI,Arial; padding:16px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:8px}
    th{background:#f4f4f4}
    button{margin-right:6px}
    .small{font-size:12px;color:#666}
    #tokenBar{margin-bottom:12px}
  </style>
</head>
<body>
  <h2>Paired Mobile Devices</h2>
  <div id="tokenBar">
    <label for="adminTokenInput">Admin token (optional): </label>
    <input id="adminTokenInput" placeholder="Paste ADMIN_TOKEN for remote access" style="width:320px" />
    <button id="setToken">Set</button>
    <span id="tokenHint" class="small">If ADMIN_TOKEN is configured on the server, provide it here to manage devices remotely. Leave blank when opening locally.</span>
  </div>
  <div>
    <button id="newPair">Create pairing code</button>
    <span id="pairInfo" class="small"></span>
  </div>
  <table id="devicesTable">
    <thead><tr><th>Name</th><th>Id</th><th>Created</th><th>Last seen</th><th>Revoked</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    let adminToken = '';
    const tokenInput = document.getElementById('adminTokenInput');
    const setBtn = document.getElementById('setToken');
    setBtn.onclick = ()=>{ adminToken = tokenInput.value.trim(); tokenInput.value=''; tokenInput.placeholder = adminToken ? 'Token set' : 'No token'; };

    async function api(path, opts = {}) {
      opts.headers = opts.headers || {};
      if (adminToken) {
        opts.headers['Authorization'] = 'Bearer ' + adminToken;
      }
      const res = await fetch(path, opts);
      if (!res.ok) {
        const text = await res.text();
        let msg = res.status + ' ' + res.statusText;
        try{ const j = JSON.parse(text); if (j && j.error) msg = j.error; } catch(e){}
        throw new Error(msg);
      }
      return res.json();
    }

    async function refresh() {
      try{
        const j = await api('/mobile/devices');
        const tbody = document.querySelector('#devicesTable tbody');
        tbody.innerHTML = '';
        for(const d of j.devices){
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${escapeHtml(d.name)}</td><td>${d.id}</td><td>${d.createdAt}</td><td>${d.lastSeenAt||''}</td><td>${d.revoked}</td><td></td>`;
          const td = tr.querySelector('td:last-child');
          const revokeBtn = document.createElement('button'); revokeBtn.textContent='Revoke';
          revokeBtn.onclick = async ()=>{ await api('/mobile/devices/'+d.id+'/revoke',{method:'POST'}); refresh(); };
          const rotateBtn = document.createElement('button'); rotateBtn.textContent='Rotate Token';
          rotateBtn.onclick = async ()=>{ const r=await api('/mobile/devices/'+d.id+'/rotate',{method:'POST'}); alert('New token (copy once):\n'+r.token); refresh(); };
          td.appendChild(revokeBtn); td.appendChild(rotateBtn);
          tbody.appendChild(tr);
        }
      }catch(e){ console.error(e); /* don't spam users with alerts on initial load */ }
    }

    document.getElementById('newPair').onclick = async ()=>{
      try{
        const r = await api('/mobile/pair/request',{method:'POST'});
        document.getElementById('pairInfo').textContent = 'Code: '+r.code+' (expires: '+new Date(r.expiresAt).toLocaleTimeString()+')';
      }catch(e){ alert('Failed to create pairing code: '+e.message) }
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>\"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
